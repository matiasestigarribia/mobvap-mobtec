name: Django CD

# This workflow runs ONLY on direct pushes to main (i.e. after a PR is merged).
# Branch protection rules on main require the Django CI workflow (lint + tests)
# to pass before a merge is permitted, so by the time this workflow fires,
# the code has already been vetted by CI. There is no need to re-run tests here.

on:
  push:
    branches: [ "main" ]

jobs:

  # ---------------------------------------------------------------------------
  # Job: Deploy
  # SSHs into the remote VM, pulls the latest code, rebuilds Docker images,
  # runs post-deploy management commands, validates via health check, and
  # automatically rolls back to the previous commit if the health check fails.
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # Step 1: Check out the repository.
      # Required so that ${{ github.sha }} and other git context are available.
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Announce the deployment.
      # -----------------------------------------------------------------------
      - name: Announce deploy start
        run: |
          echo "Starting deployment of commit ${{ github.sha }} to production."

      # -----------------------------------------------------------------------
      # Step 3: Deploy with automatic rollback.
      #
      # Strategy:
      #   a) Save the current stable SHA before pulling new code.
      #   b) Pull, rebuild, migrate, collectstatic.
      #   c) Print Gunicorn logs, then wait up to 60s hitting /health/ 5 times.
      #   d) If health check fails -> dump logs, restore previous SHA, rebuild.
      #   e) If health check passes -> prune unused images, confirm success.
      #
      # Health check approach:
      #   Port 8000 is NOT exposed to the VM host. We exec into the web
      #   container and pipe a Python script via stdin to urllib — this avoids
      #   ALL shell quoting issues with single-quoted Python -c strings and
      #   ensures errors are printed (not suppressed) for CI visibility.
      #
      # The -T flag on `docker compose exec` suppresses TTY allocation,
      # which is required in non-interactive CI environments.
      # -----------------------------------------------------------------------
      - name: Deploy to production VM (with rollback)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          # Increase timeout: build + migrate + collectstatic can take 2-3 min.
          command_timeout: 20m
          script: |
            set -e
            cd ${{ secrets.VM_PROJECT_DIR }}

            # ------------------------------------------------------------------
            # [1/6] Save the current stable commit so we can roll back to it.
            # ------------------------------------------------------------------
            PREV_SHA=$(git rev-parse HEAD)
            echo "Current stable SHA: $PREV_SHA"
            echo "Deploying new SHA:  ${{ github.sha }}"

            # ------------------------------------------------------------------
            # [2/6] Pull latest code.
            # ------------------------------------------------------------------
            echo "--- [2/6] Fetching latest code from main ---"
            git fetch origin main
            git reset --hard origin/main

            # ------------------------------------------------------------------
            # [3/6] Rebuild and restart containers.
            # ------------------------------------------------------------------
            echo "--- [3/6] Rebuilding and restarting containers ---"
            docker compose build --no-cache web
            docker compose up -d

            # ------------------------------------------------------------------
            # [4/6] Run post-deploy management commands.
            # ------------------------------------------------------------------
            echo "--- [4/6] Running migrate and collectstatic ---"
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput

            # ------------------------------------------------------------------
            # [5/6] Health check.
            #
            # Print the last 30 lines of Gunicorn logs before polling so any
            # startup errors are visible in the CI log even if the check fails.
            #
            # The Python script is piped via stdin to avoid single-quote
            # conflicts inside the shell heredoc/script block. stderr is kept
            # open (no 2>/dev/null) so urllib exceptions are captured and
            # printed to CI output for diagnosis. tail -1 extracts only the
            # last line, which is either "200" or an "ERR: ..." message.
            # ------------------------------------------------------------------
            echo "--- [5/6] Health check (waiting 10s for app to warm up) ---"
            echo "--- Gunicorn startup logs (last 30 lines) ---"
            docker compose logs web --tail=30
            echo "--- End of startup logs ---"
            sleep 10

            ATTEMPTS=5
            HEALTHY=false

            set +e
            for i in $(seq 1 $ATTEMPTS); do
              echo "  Attempt $i/$ATTEMPTS — checking http://localhost:8000/health/ inside web container"
              HTTP_CODE=$(printf 'import urllib.request\ntry:\n    r=urllib.request.urlopen("http://localhost:8000/health/",timeout=10)\n    print(r.getcode())\nexcept Exception as e:\n    print("ERR:", e)\n' | docker compose exec -T web python3 2>&1 | tail -1)
              echo "  HTTP response: $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTHY=true
                break
              fi
              if [ "$i" -lt "$ATTEMPTS" ]; then
                echo "  Not healthy yet, waiting 10s before next attempt..."
                sleep 10
              fi
            done
            set -e

            # ------------------------------------------------------------------
            # [6/6] Rollback if health check failed, confirm if it passed.
            # ------------------------------------------------------------------
            if [ "$HEALTHY" = "false" ]; then
              echo ""
              echo "!!! HEALTH CHECK FAILED after $ATTEMPTS attempts. Rolling back to $PREV_SHA !!!"
              echo ""

              echo "--- Gunicorn logs at time of failure (last 50 lines) ---"
              docker compose logs web --tail=50
              echo "--- End of failure logs ---"

              git reset --hard "$PREV_SHA"
              docker compose up --build -d
              docker compose exec -T web python manage.py migrate --noinput
              docker compose exec -T web python manage.py collectstatic --noinput

              echo "Rollback to $PREV_SHA complete."
              # Exit non-zero so GitHub marks this workflow run as failed.
              exit 1
            fi

            echo "--- [6/6] Health check passed. Deployment of ${{ github.sha }} is live. ---"

            # Reclaim disk space from dangling/untagged images left by --no-cache build.
            echo "--- Pruning unused Docker images ---"
            docker image prune -f

      # -----------------------------------------------------------------------
      # Step 4: Confirm successful deployment (only runs if step 3 succeeded).
      # -----------------------------------------------------------------------
      - name: Announce deploy success
        run: |
          echo "Deployment of commit ${{ github.sha }} completed successfully."
